<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Details | FlavorVault</title>
  <meta name="description" content="View restaurant details, ratings, and reviews on FlavorVault.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ── Detail Hero ── */
    .detail-hero {
      min-height: 350px;
      position: relative;
      display: flex;
      align-items: flex-end;
      padding: 40px 0;
      overflow: hidden;
    }

    .detail-hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .detail-hero-overlay {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.15) 100%);
    }

    .detail-hero-content {
      position: relative;
      z-index: 1;
      color: #fff;
    }

    .back-link {
      display: inline-block;
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 16px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #fff;
    }

    .detail-hero-emoji {
      font-size: 3rem;
      margin-bottom: 8px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
    }

    .detail-hero-title {
      font-family: var(--font-heading, 'Outfit', sans-serif);
      font-size: 2.5rem;
      font-weight: 700;
      margin: 0 0 12px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .detail-hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      color: rgba(255,255,255,0.8);
      font-size: 0.95rem;
    }

    .detail-hero-separator {
      opacity: 0.5;
    }

    .detail-hero-rating {
      color: var(--star-filled, #fbbf24);
      font-weight: 600;
    }

    /* ── Detail Layout ── */
    .detail-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 32px;
      padding: 40px 0 60px;
    }

    /* ── Info Card ── */
    .detail-info-card {
      background: var(--bg-card, rgba(255,255,255,0.06));
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 24px;
      border-radius: var(--radius-lg, 16px);
      border: 1px solid var(--border-glass, rgba(255,255,255,0.08));
    }

    .info-row {
      display: flex;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-glass, rgba(255,255,255,0.08));
      align-items: flex-start;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-icon {
      font-size: 20px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .info-label {
      color: var(--text-secondary, #9ca3af);
      font-size: 0.8rem;
      margin-bottom: 2px;
    }

    .info-value {
      color: var(--text-primary, #f3f4f6);
      font-size: 0.95rem;
    }

    /* ── Rating Breakdown ── */
    .rating-overview {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .rating-big-number {
      font-family: var(--font-heading, 'Outfit', sans-serif);
      font-size: 3rem;
      font-weight: 800;
      color: var(--text-primary, #f3f4f6);
      line-height: 1;
    }

    .rating-overview-right {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .rating-stars-display .star {
      font-size: 1.1rem;
    }

    .rating-total-text {
      color: var(--text-secondary, #9ca3af);
      font-size: 0.85rem;
    }

    .rating-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 6px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .rating-bar-row:hover {
      background: var(--bg-hover, rgba(255,255,255,0.04));
    }

    .rating-bar-row.active {
      background: var(--bg-hover, rgba(255,255,255,0.08));
    }

    /* ── Write Review Card ── */
    .write-review-card {
      background: var(--bg-card, rgba(255,255,255,0.06));
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 24px;
      border-radius: var(--radius-lg, 16px);
      border: 1px solid var(--border-glass, rgba(255,255,255,0.08));
      margin-bottom: 24px;
    }

    .write-review-card h3 {
      font-family: var(--font-heading, 'Outfit', sans-serif);
      margin: 0 0 4px;
    }

    .review-textarea {
      background: var(--bg-card, rgba(255,255,255,0.06));
      width: 100%;
      min-height: 120px;
      padding: 16px;
      border-radius: var(--radius-md, 12px);
      border: 1px solid var(--border-glass, rgba(255,255,255,0.08));
      resize: vertical;
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--text-primary, #f3f4f6);
      transition: border-color 0.2s;
      box-sizing: border-box;
    }

    .review-textarea:focus {
      outline: none;
      border-color: var(--primary, #8b5cf6);
    }

    .review-textarea::placeholder {
      color: var(--text-secondary, #9ca3af);
    }

    /* ── Star Select ── */
    .star-select-area {
      display: flex;
      gap: 6px;
      margin: 16px 0;
    }

    .star-select {
      font-size: 32px;
      cursor: pointer;
      color: var(--star-empty, #4b5563);
      transition: color 0.15s, transform 0.15s;
      user-select: none;
    }

    .star-select:hover {
      transform: scale(1.15);
    }

    .star-select.active,
    .star-select.selected {
      color: var(--star-filled, #fbbf24);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .detail-layout {
        grid-template-columns: 1fr;
      }

      .detail-hero-title {
        font-size: 1.8rem;
      }

      .detail-hero {
        min-height: 280px;
        padding: 24px 0;
      }

      .detail-hero-meta {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">🍽️</span>
        <span class="logo-text">FlavorVault</span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="index.html" class="nav-link">Home</a>
        <a href="dashboard.html" class="nav-link">Dashboard</a>
      </div>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">
          <span class="theme-icon">🌙</span>
        </button>
        <div class="nav-user" id="navUser"></div>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Detail Hero -->
  <section class="detail-hero" id="detailHero"></section>

  <!-- Detail Content -->
  <section class="detail-content">
    <div class="container">
      <div class="detail-layout">
        <!-- Main content: reviews -->
        <div class="detail-main" id="detailMain"></div>
        <!-- Sidebar: info + ratings -->
        <div class="detail-sidebar" id="detailSidebar"></div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-section">
          <h3>🍽️ FlavorVault</h3>
          <p>Your ultimate restaurant discovery platform.</p>
          <p style="margin-top: 12px; font-weight: 600; font-size: 0.9rem; color: var(--text-primary);">📞 Helpline: 9345755706</p>
        </div>
        <div class="footer-section">
          <h3>Quick Links</h3>
          <ul class="footer-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
          </ul>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 FlavorVault. Built with ❤️</p>
      </div>
    </div>
  </footer>

  <div class="toast-container" id="toastContainer"></div>
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/restaurant.js"></script>
</body>
</html>
